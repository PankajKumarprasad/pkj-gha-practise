name: 01 - pkj flask CI wokflow
on: push
jobs:
    flask-ci-jobs:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: build docker image
              run: docker build -t pankaj1204-flask-app:v1.0 -f 03-actions/Dockerfile 03-actions/

            - name: run container
              run: docker run -d -p 5000:5000 --name pankaj1204-flask-app pankaj1204-flask-app:v1.0

            - name: check container status
              run: |
                sleep 2
                docker ps -a
                docker logs pankaj1204-flask-app

            - name: smoke test
              run: |
                 sleep 5 # wait for the container to start
                 curl -v http://localhost:5000/health

        