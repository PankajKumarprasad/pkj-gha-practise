name: 01 - pkj flask CI wokflow
on: [push]
jobs:
    flask-ci-jobs:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: build docker image
              run: docker build -t pkj-flask-app:v1.0 .

            - name: run container
              run: docker run -d -p 5000:5000 -name pkj-flask-app pkj-flask-app:v1.0

            - name: smoke test
              run: |
                 sleep 5 # wait for the container to start
                 curl -f http://localhost:5000/health

        